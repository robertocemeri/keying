<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#111114"/>
    </linearGradient>
    <radialGradient id="brand" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#c9f062"/>
      <stop offset="0.6" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#65a30d"/>
    </radialGradient>
    <radialGradient id="ambient" cx="0.7" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#a3e635" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#18181b"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)"/>
  <rect width="1400" height="560" fill="url(#ambient)"/>

  <!-- Left side: brand + tagline -->
  <g transform="translate(96, 96)">
    <!-- Brand mark -->
    <g>
      <rect width="44" height="44" rx="9" fill="url(#brand)"/>
      <rect x="10" y="18" width="24" height="8" fill="#0a0a0c"/>
      <rect x="26" y="10" width="8" height="16" fill="#0a0a0c"/>
    </g>
    <text x="58" y="32" fill="#fafafa" font-size="28" font-weight="600" letter-spacing="-0.5">Keying</text>

    <!-- Headline -->
    <text x="0" y="180" fill="#fafafa" font-size="76" font-style="italic" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-2">A password manager</text>
    <text x="0" y="252" fill="#fafafa" font-size="76" font-style="italic" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-2">that stays on</text>
    <text x="0" y="324" fill="#a3e635" font-size="76" font-style="italic" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-2">your Mac.</text>

    <!-- Bullets -->
    <g transform="translate(0, 380)" font-size="14" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" letter-spacing="1">
      <circle cx="4" cy="-4" r="3" fill="#a3e635"/>
      <text x="18" y="0" fill="#fafafa">END-TO-END LOCAL ENCRYPTION</text>
      <circle cx="4" cy="28" r="3" fill="#a3e635"/>
      <text x="18" y="32" fill="#fafafa">ZERO CLOUD, ZERO ACCOUNT</text>
      <circle cx="4" cy="60" r="3" fill="#a3e635"/>
      <text x="18" y="64" fill="#fafafa">OPEN SOURCE, AUDITABLE</text>
    </g>
  </g>

  <!-- Right side: mock window -->
  <g transform="translate(820, 100)">
    <rect width="500" height="360" rx="14" fill="url(#cardBg)" stroke="#27272a" stroke-width="1"/>

    <!-- Title bar -->
    <rect width="500" height="36" rx="14" fill="#18181b"/>
    <rect width="500" y="22" height="14" fill="#18181b"/>
    <circle cx="18" cy="18" r="5" fill="#ef4444"/>
    <circle cx="38" cy="18" r="5" fill="#eab308"/>
    <circle cx="58" cy="18" r="5" fill="#22c55e"/>
    <g transform="translate(90, 12)">
      <rect width="11" height="11" rx="2" fill="url(#brand)"/>
      <rect x="2" y="4" width="6" height="3" fill="#0a0a0c"/>
      <rect x="6" y="2" width="3" height="5" fill="#0a0a0c"/>
    </g>
    <text x="108" y="22" fill="#a1a1aa" font-size="11" font-weight="500">Keying</text>

    <!-- Search -->
    <rect x="20" y="60" width="460" height="36" rx="8" fill="#0a0a0c" stroke="#27272a"/>
    <text x="36" y="83" fill="#52525b" font-size="13">Search vault…</text>
    <text x="450" y="83" fill="#52525b" font-size="11" font-family="ui-monospace, monospace">⌘K</text>

    <!-- Entry rows -->
    <g font-family="Helvetica, Arial, sans-serif">
      <g transform="translate(20, 120)">
        <rect width="460" height="56" rx="8" fill="#a3e635" fill-opacity="0.08" stroke="#a3e635" stroke-opacity="0.3"/>
        <rect x="14" y="14" width="28" height="28" rx="6" fill="#27272a"/>
        <text x="20" y="32" fill="#a3e635" font-size="13" font-weight="600">G</text>
        <text x="54" y="26" fill="#fafafa" font-size="13" font-weight="500">github.com</text>
        <text x="54" y="44" fill="#71717a" font-size="11" font-family="ui-monospace, monospace">roberto@example.com</text>
        <text x="430" y="36" fill="#a3e635" font-size="10" font-family="ui-monospace, monospace">↵ FILL</text>
      </g>

      <g transform="translate(20, 184)">
        <rect width="460" height="56" rx="8" fill="#0a0a0c" stroke="#1f1f23"/>
        <rect x="14" y="14" width="28" height="28" rx="6" fill="#1f1f23"/>
        <text x="20" y="32" fill="#fafafa" font-size="13" font-weight="600" opacity="0.7">A</text>
        <text x="54" y="26" fill="#fafafa" font-size="13" font-weight="500">aws.amazon.com</text>
        <text x="54" y="44" fill="#71717a" font-size="11" font-family="ui-monospace, monospace">roberto.work@…</text>
      </g>

      <g transform="translate(20, 248)">
        <rect width="460" height="56" rx="8" fill="#0a0a0c" stroke="#1f1f23"/>
        <rect x="14" y="14" width="28" height="28" rx="6" fill="#1f1f23"/>
        <text x="20" y="32" fill="#fafafa" font-size="13" font-weight="600" opacity="0.7">F</text>
        <text x="54" y="26" fill="#fafafa" font-size="13" font-weight="500">figma.com</text>
        <text x="54" y="44" fill="#71717a" font-size="11" font-family="ui-monospace, monospace">design.team@…</text>
      </g>
    </g>

    <!-- Footer / Touch ID hint -->
    <text x="20" y="338" fill="#52525b" font-size="11" font-family="ui-monospace, monospace" letter-spacing="0.5">UNLOCKED WITH TOUCH ID · AUTO-LOCK IN 14:23</text>
  </g>
</svg>

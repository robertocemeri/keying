<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#111114"/>
    </linearGradient>
    <radialGradient id="brand" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#c9f062"/>
      <stop offset="0.6" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#65a30d"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a3e635" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a3e635" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#a3e635" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Soft glow band -->
  <rect x="0" y="120" width="440" height="80" fill="url(#glow)"/>

  <!-- Brand mark -->
  <g transform="translate(32, 32)">
    <rect width="28" height="28" rx="6" fill="url(#brand)"/>
    <rect x="6" y="11" width="16" height="6" fill="#0a0a0c"/>
    <rect x="16" y="6" width="6" height="11" fill="#0a0a0c"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="55" fill="#fafafa" font-size="22" font-weight="600" letter-spacing="-0.5">Keying</text>

  <!-- Tagline -->
  <text x="32" y="156" fill="#fafafa" font-size="34" font-style="italic" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-1">Your passwords.</text>
  <text x="32" y="194" fill="#a3e635" font-size="34" font-style="italic" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-1">Your Mac.</text>

  <!-- Footer line -->
  <text x="32" y="244" fill="#a1a1aa" font-size="11" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" letter-spacing="2">NO CLOUD · NO ACCOUNT · OPEN SOURCE</text>
</svg>

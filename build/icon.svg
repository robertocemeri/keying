<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bef264"/>
      <stop offset="100%" stop-color="#65a30d"/>
    </linearGradient>
    <filter id="inner" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background tile with rounded corners (Apple-ish ~22.5% radius) -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- subtle inner stroke -->
  <rect x="6" y="6" width="1012" height="1012" rx="226" ry="226" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

  <!-- keyhole: bow (circle) + bit (rectangle) drawn with the key gradient -->
  <g filter="url(#inner)">
    <circle cx="512" cy="430" r="158" fill="url(#key)"/>
    <rect x="430" y="528" width="164" height="240" rx="46" fill="url(#key)"/>
    <!-- subtle highlight -->
    <ellipse cx="470" cy="380" rx="50" ry="22" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- accent dot -->
  <circle cx="820" cy="220" r="14" fill="#a3e635" opacity="0.9"/>
</svg>
